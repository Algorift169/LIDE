Section "Files"
    FontPath "/usr/share/fonts/X11/misc"
    FontPath "/usr/share/fonts/X11/100dpi"
    FontPath "/usr/share/fonts/X11/75dpi"
    FontPath "/usr/share/fonts/X11/Type1"
EndSection

Section "Device"
    Identifier "virtio-gpu"
    Driver "modesetting"
    Option "HWCursor" "on"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "virtio-gpu"
    Monitor "Monitor0"
    DefaultDepth 24
EndSection

Section "Monitor"
    Identifier "Monitor0"
    HorizSync 31.5 - 50.0
    VertRefresh 60
EndSection

Section "InputDevice"
    Identifier "Mouse0"
    Driver "libinput"
    Option "Protocol" "auto"
    Option "Device" "/dev/input/mice"
    Option "ZAxisMapping" "4 5"
EndSection

Section "InputDevice"
    Identifier "Keyboard0"
    Driver "libinput"
    Option "Protocol" "standard"
    Option "XkbLayout" "us"
EndSection

Section "ServerLayout"
    Identifier "Default"
    Screen "Screen0"
    InputDevice "Mouse0" "CorePointer"
    InputDevice "Keyboard0" "CoreKeyboard"
EndSection

Section "ServerFlags"
    Option "BlankTime" "0"
    Option "StandbyTime" "0"
    Option "SuspendTime" "0"
    Option "OffTime" "0"
EndSection

Section "InputClass"
    Identifier "libinput pointer"
    MatchIsPointer "on"
    MatchDevicePath "/dev/input/event*"
    Driver "libinput"
EndSection

Section "InputClass"
    Identifier "libinput keyboard"
    MatchIsKeyboard "on"
    MatchDevicePath "/dev/input/event*"
    Driver "libinput"
EndSection
